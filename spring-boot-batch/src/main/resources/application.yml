# 应用名称
spring:
  application:
    name: spring-boot-batch
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ ?serverTimezone=GMT
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver
    # 执行schema-all.sql
  batch:
    # 初始化需要的表
    job:
      #是否项目启动时启动任务
      enabled: false
    jdbc:
      initialize-schema: always
  sql:
    init:
      mode:
